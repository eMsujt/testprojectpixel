  vault:
    description: Manage your personal vault balance and tier.
    usage: /vault [info|deposit <amount>|withdraw <amount>|upgrade]
    permission: skyblock.vault
  wardrobe:
    description: View and manage your saved armor outfits.
    usage: /wardrobe [save <name>|load <name>|delete <name>|list|slots|slot <save|load|clear> <SLOT>]
    aliases: [wd]
    permission: skyblock.wardrobe
  warp:
    description: Teleport to a named warp point.
    usage: /warp [name|set <name>|delete <name>]
    permission: skyblock.warp
    aliases: [warps]
  hub:
    description: Teleport to the configured hub.
    usage: /hub
    permission: skyblock.hub
    aliases: [spawn]

