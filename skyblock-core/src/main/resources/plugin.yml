  skills:
    description: Open the Skills Menu.
    usage: /skills [skill]
    aliases: [sk]
    permission: skyblock.command.skills
  skyblock:
    description: Open the SkyBlock main menu.
    aliases: [sb, sky]
    usage: /skyblock
    permission: skyblock.use
  skyblock-level:
    description: View and manage your SkyBlock level and XP.
    usage: /skyblock-level [info|addxp <amount>|setxp <amount>]
