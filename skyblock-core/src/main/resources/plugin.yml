name: SkyBlock
main: com.skyblock.core.SkyBlockPlugin
api-version: '1.21'
version: '1.0'
description: SkyBlock plugin for Paper

commands:
  skyblock:
    description: Open the SkyBlock main menu.
    usage: /skyblock
    aliases: [sb]
  island:
    description: Manage your SkyBlock island.
    usage: /island <create|home|visit|invite|kick|leave>
  islandupgrade:
    description: Purchase upgrades for your SkyBlock island.
    usage: /islandupgrade <list|info|buy>
    aliases: [iu]
  skills:
    description: View your SkyBlock skills.
    usage: /skills [skill]
  skill:
    description: View your SkyBlock skill levels and XP.
    usage: /skill [skill]
    permission: skyblock.skill
  auction:
    description: Open the Auction House.
    usage: /auction [create|view|cancel]
  auctionhouse:
    description: Manage Auction House listings (BIN and bid-based).
    usage: /auctionhouse <list|create|bid|view|cancel|mine>
    aliases: [ah]
  bazaar:
    description: Open the Bazaar.
    usage: /bazaar [product]
  profile:
    description: View your SkyBlock profile.
    usage: /profile [player]
  slay:
    description: Manage your slayer quests.
    usage: /slay [type|start|info]
    permission: skyblock.slayer
  pets:
    description: Manage your pets.
    usage: /pets [equip|unequip|list]
  pet:
    description: Manage your pets.
    usage: /pet [list|equip|unequip|info]
  f:
    description: Manage SkyBlock friendships.
    usage: /f <add|remove|list|accept|deny>
  warp:
    description: Teleport to a named warp point.
    usage: /warp [name|set <name>|delete <name>]
    permission: skyblock.warp
  shop:
    description: Browse and purchase items from the SkyBlock shop.
    usage: /shop [category|buy <category> <item>]
  leaderboard:
    description: View player leaderboards.
    usage: /leaderboard [category]
    aliases: [lb]
  bank:
    description: Manage your SkyBlock bank account.
    usage: /bank [deposit|withdraw|balance]
  banking:
    description: Manage your SkyBlock banking account.
    usage: /banking [deposit|withdraw|balance]
  dungeon:
    description: Manage and view dungeon runs.
    usage: /dungeon [start|leave|info]
  essence:
    description: View and manage your SkyBlock essence balances.
    usage: /essence <balance|add|remove> [type] [amount]
    permission: skyblock.essence
  forge:
    description: Forge items using the SkyBlock forge.
    usage: /forge [list|start|collect]
  itemforge:
    description: Forge SkyBlock items with rarity-typed outputs.
    usage: /itemforge <list|start|status|collect|cancel>
  collection:
    description: View your collection progress.
    usage: /collection [name]
    aliases: [col]
    permission: skyblock.collection
  npc:
    description: Interact with NPCs and their shops.
    usage: /npc <list|shop <npc>|buy <npc> <item>>
  minion:
    description: Manage your placed minions.
    usage: /minion <list|place|upgrade|remove|info>
  alchemy:
    description: Brew potions using the SkyBlock alchemy system.
    usage: /alchemy [list|brew|status|collect|cancel]
  enchanting:
    description: View and apply SkyBlock enchantments.
    usage: /enchanting <list|info|apply|remove|view>
  enchantment:
    description: View and apply SkyBlock enchantments via the enchantment manager.
    usage: /enchantment <list|info|apply|remove|view>
  enchant:
    description: View and apply SkyBlock custom enchants.
    usage: /enchant <list|info|apply|remove|view>
  talisman:
    description: Manage your equipped talismans and view stat bonuses.
    usage: /talisman <list|equip|unequip|equipped|bonuses>
  crafting:
    description: Browse SkyBlock crafting recipes and track your crafting history.
    usage: /crafting <list|view|history|craft>
  quest:
    description: Manage your SkyBlock quests.
    usage: /quest <list|start|status|reset>
  achievement:
    description: View your SkyBlock achievements.
    usage: /achievement [list|view]
  dailyreward:
    description: Claim your daily coin reward.
    usage: /dailyreward [status]
    aliases: [daily]
  storage:
    description: Manage your personal storage pages.
    usage: /storage <info|upgrade|reset>
  trade:
    description: Trade items with another player.
    usage: /trade <player|accept|decline|add|remove|view|confirm|cancel>
  wardrobe:
    description: Save and load named armor outfits.
    usage: /wardrobe <save|load|delete|list>
  mining:
    description: View mining level, XP, speed bonus, and ore XP values.
    usage: /mining [ores|speedbonus]
  fishing:
    description: View fishing stats and trophy fish catches.
    usage: /fishing [trophy [<fish>|reset]]
  bestiary:
    description: Track your mob kill counts.
    usage: /bestiary [view <mob>|reset]
  party:
    description: Manage your party.
    usage: /party <invite|accept|decline|kick|leave|list>
  accessorybag:
    description: Manage your accessory bag and view stat bonuses.
    usage: /accessorybag <list|add|remove|bonuses>
    aliases: [abag]
  essence:
    description: View and manage your essence balances.
    usage: /essence <balance [type]|add <type> <amount>|remove <type> <amount>>

permissions:
  skyblock.warp:
    description: Use the /warp command to teleport to warp points.
    default: true
  skyblock.warp.set:
    description: Create and delete warp points via /warp set and /warp delete.
    default: op
  skyblock.collection:
    description: Use the /collection command to view collection progress.
    default: true
  skyblock.skill:
    description: Use the /skill command to view skill levels and XP.
    default: true
  skyblock.slayer:
    description: Use the /slay command to manage slayer quests.
    default: true
  skyblock.essence:
    description: Use the /essence command to view and manage essence balances.
    default: true
