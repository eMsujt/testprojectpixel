name: SkyblockCore
main: com.skyblock.core.SkyblockPlugin
api-version: '1.21'
version: 1.0.0
description: SkyBlock plugin for Paper

commands:
  skyblock:
    description: Open the SkyBlock main menu.
    usage: /skyblock
    aliases: [sb]
  menu:
    description: Open the SkyBlock main menu.
    usage: /menu
  island:
    description: Manage your SkyBlock island.
    usage: /island <create|home|visit|invite|kick|leave>
  islandupgrade:
    description: Purchase upgrades for your SkyBlock island.
    usage: /islandupgrade <list|info|buy>
    aliases: [iu]
  skills:
    description: View your SkyBlock skills.
    usage: /skills [skill]
  skill:
    description: View your SkyBlock skill levels and XP.
    usage: /skill [skill]
    permission: skyblock.skill
  auction:
    description: Open the Auction House.
    usage: /auction [create|view|cancel]
  auctionhouse:
    description: Manage Auction House listings (BIN and bid-based).
    usage: /auctionhouse <list|create|bid|view|cancel|mine>
    aliases: [ah]
  bazaar:
    description: Open the Bazaar.
    usage: /bazaar [product]
  profile:
    description: View your SkyBlock profile.
    usage: /profile [player]
  combat:
    description: View and manage your combat stats.
    usage: /combat [info|kills|deaths|mobkills|reset]
  slay:
    description: Manage your slayer quests.
    usage: /slay [type|start|info]
    permission: skyblock.slayer
  pets:
    description: Manage your pets.
    usage: /pets [equip|unequip|list]
  pet:
    description: Manage your pets.
    usage: /pet [list|equip|unequip|info]
  f:
    description: Manage SkyBlock friendships.
    usage: /f <add|remove|list|accept|deny>
  friend:
    description: Manage your SkyBlock friend list.
    usage: /friend <add|remove|list> [player]
    permission: skyblock.friend
  mailbox:
    description: View and manage your SkyBlock mailbox.
    usage: /mailbox [inbox|read <id>|delete <id>|clear]
    permission: skyblock.mailbox
  booster:
    description: Activate XP or coin boosters
    usage: /booster <status|activate|deactivate|list>
    permission: skyblock.booster
  warp:
    description: Teleport to a named warp point.
    usage: /warp [name|set <name>|delete <name>]
    permission: skyblock.warp
  shop:
    description: Browse and purchase items from the SkyBlock shop.
    usage: /shop [category|buy <category> <item>]
  leaderboard:
    description: View player leaderboards.
    usage: /leaderboard [category]
    aliases: [lb]
  bank:
    description: Manage your SkyBlock bank account.
    usage: /bank <balance|deposit|withdraw>
    permission: skyblock.bank
  banking:
    description: Manage your SkyBlock banking account.
    usage: /banking [deposit|withdraw|balance]
  dungeon:
    description: Manage and view dungeon runs.
    usage: /dungeon [start|leave|info]
  essence:
    description: View and manage your SkyBlock essence balances.
    usage: /essence <balance|add|remove> [type] [amount]
    permission: skyblock.essence
  forge:
    description: Forge items using the SkyBlock forge.
    usage: /forge [list|start|collect]
  itemforge:
    description: Forge SkyBlock items with rarity-typed outputs.
    usage: /itemforge <list|start|status|collect|cancel>
  collection:
    description: View your collection progress.
    usage: /collection [name]
    aliases: [col]
    permission: skyblock.collection
  npc:
    description: Interact with NPCs and their shops.
    usage: /npc <list|shop <npc>|buy <npc> <item>>
  npcmanager:
    description: Admin commands for managing registered NPCs.
    usage: /npcmanager <list|types|info <uuid>|unregister <uuid>>
  minion:
    description: Manage your placed minions.
    usage: /minion <list|place|upgrade|remove|info>
  alchemy:
    description: Brew potions using the SkyBlock alchemy system.
    usage: /alchemy [list|brew|status|collect|cancel]
  enchanting:
    description: View and apply SkyBlock enchantments.
    usage: /enchanting <list|info|apply|remove|view>
  enchantment:
    description: View and apply SkyBlock enchantments via the enchantment manager.
    usage: /enchantment <list|info|apply|remove|view>
  enchant:
    description: View and apply SkyBlock custom enchants.
    usage: /enchant <list|info|apply|remove|view>
  skyblockenchant:
    description: View and apply SkyBlock enchants via the SkyBlockEnchantManager.
    usage: /skyblockenchant <list|info|apply|remove|view>
  talisman:
    description: Manage your equipped talismans and view stat bonuses.
    usage: /talisman <list|equip|unequip|equipped|bonuses>
  crafting:
    description: Browse SkyBlock crafting recipes and track your crafting history.
    usage: /crafting <list|view|history|craft>
  quest:
    description: Manage your SkyBlock quests.
    usage: /quest <list|start|status|reset>
  achievement:
    description: View your SkyBlock achievements.
    usage: /achievement [list|view]
  dailyreward:
    description: Claim your daily coin reward.
    usage: /dailyreward [status]
    aliases: [daily]
  storage:
    description: Manage your personal storage pages.
    usage: /storage <info|upgrade|reset>
  trade:
    description: Trade items with another player.
    usage: /trade <player|accept|decline|add|remove|view|confirm|cancel>
  wardrobe:
    description: Save and load named armor outfits.
    usage: /wardrobe <save|load|delete|list>
  mining:
    description: View mining level, XP, speed bonus, and ore XP values.
    usage: /mining [ores|speedbonus]
  fishing:
    description: View fishing stats and trophy fish catches.
    usage: /fishing [trophy [<fish>|reset]]
  bestiary:
    description: Track your mob kill counts.
    usage: /bestiary [view <mob>|reset]
  party:
    description: Manage your party.
    usage: /party <invite|accept|decline|kick|leave|list>
  accessorybag:
    description: Manage your accessory bag and view stat bonuses.
    usage: /accessorybag <list|add|remove|bonuses>
    aliases: [abag]
  accessory:
    description: Manage accessory rarities and view stat multipliers.
    usage: /accessory <list|info|setrarity|remove>
  essence:
    description: View and manage your essence balances.
    usage: /essence <balance [type]|add <type> <amount>|remove <type> <amount>>
  hotm:
    description: View and manage Heart of the Mountain perk levels.
    usage: /hotm <view [perk]|upgrade <perk>|set <perk> <level>|reset>
    permission: skyblock.hotm
  hotmtree:
    description: View and manage Heart of the Mountain perk tree.
    usage: /hotmtree <view [perk]|upgrade <perk>|set <perk> <level>|reset>
    permission: skyblock.hotm
  crimsonisle:
    description: View and manage Crimson Isle faction, reputation, and Kuudra keys.
    usage: /crimsonisle <faction [set <faction>]|reputation [add|remove <faction> <amt>]|kuudra [add|remove <tier> <amt>]>
    permission: skyblock.crimsonisle
  backpack:
    description: Create and manage personal item backpacks.
    usage: /backpack <create <name>|delete <name>|list>
    permission: skyblock.backpack
  kuudra:
    description: View and manage Kuudra key counts and completions per tier.
    usage: /kuudra <keys [add|remove|set <tier> <amount>]|completions [add <tier> <amount>]>
    permission: skyblock.kuudra
  garden:
    description: View and manage your Garden plot, visitors, and crop upgrades.
    usage: /garden <info|plot [set|add <level>]|visitors [set|add <amount>]|crop [set|add <crop> <level>]|reset>
    permission: skyblock.garden
  guild:
    description: Create and manage player guilds.
    usage: /guild <create|invite|accept|decline|kick|leave|disband|info>
    permission: skyblock.guild
  reforge:
    description: View and apply item reforges.
    usage: /reforge [list|info <name>|apply <name>|clear]
    permission: skyblock.reforge
  rift:
    description: View and manage your Rift dimension state.
    usage: /rift <info|enter [zone]|exit|reset>
    permission: skyblock.rift
  jacobcontest:
    description: View and participate in Jacob's Farming Contests.
    usage: /jacobcontest [info|enter <crop>|pb [crop]|medals]
    permission: skyblock.jacobcontest
  season:
    description: View and manage the current SkyBlock season.
    usage: /season <current|next|set <season>|advance>
    permission: skyblock.season
  cooldown:
    description: View and manage per-player per-key cooldowns.
    usage: /cooldown <list|check <key>|set <key> <seconds>|clear <key>|clearall>
    permission: skyblock.cooldown
  stats:
    description: View and manage your SkyBlock player stats.
    usage: /stats [info|get <stat>|set <stat> <value>|reset]
    permission: skyblock.stats
  fairysoul:
    description: View and manage your fairy soul collection.
    usage: /fairysoul [info|collect <key>|reset]
    permission: skyblock.fairysoul
  mayor:
    description: View the active mayor and vote for candidates.
    usage: /mayor [vote <mayor>|set <mayor>]
    permission: skyblock.mayor
  slayer:
    description: Manage your slayer quests and view boss info.
    usage: /slayer [info|start|type]
    permission: skyblock.slayer
  museum:
    description: Donate items and view your museum collection.
    usage: /museum [info|view <category>|donate <item>|reset]
    permission: skyblock.museum
  trophy:
    description: View and unlock SkyBlock trophies.
    usage: /trophy [list|unlocked|info <trophy>|unlock <trophy>|reset]
    permission: skyblock.trophy
  trophyfish:
    description: View your trophy fish catch counts and drop chances.
    usage: /trophyfish [info|reset]
    permission: skyblock.trophyfish
  sacks:
    description: View and manage your item sacks.
    usage: /sacks [view <type>|list|reset]
    permission: skyblock.sacks
  hub:
    description: Teleport to the SkyBlock hub world.
    usage: /hub
  jacob:
    description: Submit scores and view history for Jacob's Farming Contests.
    usage: /jacob [submit <crop> <score>|history|medals|crops]
    permission: skyblock.jacob
  ability:
    description: View, equip, and unlock player abilities.
    usage: /ability <list|info <type>|equip <type>|unequip|unlock <type>>
    permission: skyblock.ability
  chocolatefactory:
    description: View and manage your Chocolate Factory rabbits and production.
    usage: /chocolatefactory <balance|production|rabbits|rarities|addrabbit <rarity>>
    permission: skyblock.chocolatefactory
  gemstone:
    description: View your gemstone collection counts.
    usage: /gemstone <info|view <type>|types|add <type> <amount>>
    permission: skyblock.gemstone
  calendar:
    description: View the current SkyBlock calendar and event participation.
    usage: /calendar <info|months|events|set <day>>
    permission: skyblock.calendar
  event:
    description: View and join SkyBlock events.
    usage: /event <list|join <event>|status [event]|reset>
    permission: skyblock.event
  foraging:
    description: View foraging level, XP, and log chop counts.
    usage: /foraging [info <log>|reset]
    permission: skyblock.foraging
  crystalhollows:
    description: Manage Crystal Hollows zones and crystal collection.
    usage: /crystalhollows [zones|enter <zone>|leave|crystals|collect <crystal>]
    permission: skyblock.crystalhollows
  miningzone:
    description: View and manage your mining zone assignment.
    usage: /miningzone [list|set <zone>|clear]
    permission: skyblock.miningzone
  dungeons:
    description: Start dungeon runs and view scores by type.
    usage: /dungeons [start <type>|leave|info|scores <type>]
    permission: skyblock.dungeons
  collections:
    description: View your SkyBlock collection progress.
    usage: /collections [collection|category <cat>|reset]
    permission: skyblock.collections
  chat:
    description: Switch your active chat channel.
    usage: /chat [global|party|guild|trade]
    permission: skyblock.chat
  mail:
    description: Send and read player mail messages.
    usage: /mail <inbox|send <player> <message>|clear>
    permission: skyblock.mail
  coop:
    description: Manage your co-op island group.
    usage: /coop <invite|accept|decline|kick|leave|list>
    permission: skyblock.coop
  repair:
    description: Repair items using coins based on material durability cost.
    usage: /repair <hand|all>
    permission: skyblock.repair
  crimson:
    description: View and manage Crimson Isle faction and reputation.
    usage: /crimson [info|faction <faction>|reputation [faction]]
    permission: skyblock.crimson
  vault:
    description: Manage your personal vault balance and tier.
    usage: /vault [info|deposit <amount>|withdraw <amount>|upgrade]
    permission: skyblock.vault
  stat:
    description: View your effective SkyBlock player stats.
    usage: /stat [<stat>]
    permission: skyblock.stat
  skyblock-level:
    description: View and manage your SkyBlock level and XP.
    usage: /skyblock-level [info|addxp <amount>|setxp <amount>]
    aliases: [sblevel]
    permission: skyblock.skyblock-level
  run:
    description: Track your dungeon run statistics.
    usage: /run [info [floor]|reset]
    permission: skyblock.run
  title:
    description: Manage your SkyBlock titles.
    usage: /title [list|equip <title>|unequip|info <title>]
    permission: skyblock.title

permissions:
  skyblock.warp:
