  rift:
    description: View and manage your Rift dimension progress.
    usage: /rift [info|enter [zone]|exit|reset]
    permission: skyblock.rift
  run:
    description: Track your dungeon run statistics.
    usage: /run [info [floor]|reset]
    permission: skyblock.run
  sack:
    description: View the contents of your sacks.
