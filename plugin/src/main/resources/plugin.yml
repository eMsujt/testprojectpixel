    description: Allows use of the /trade command.
    default: true
  skyblock.command.event:
    description: Allows use of the /event command.
    default: true
  skyblock.command.quest:
    description: Allows use of the /quest command.
    default: true
  skyblock.command.garden:
    description: Allows use of the /garden command.
