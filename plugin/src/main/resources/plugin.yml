name: SkyBlock
version: 1.0.0
main: com.skyblock.plugin.SkyBlockPlugin
api-version: '26.1'
description: Hypixel-SkyBlock-style remake for Paper
authors: [SkyBlock Team]
website: https://github.com/eMsujt/testprojectpixel
load: POSTWORLD

commands:
  skyblock:
    description: Root SkyBlock command.
    usage: /<command> [help]
    aliases: [sb]
    permission: skyblock.command.skyblock
  auctionhouse:
    description: Open the auction house.
    usage: /<command>
    aliases: [ah]
  collections:
    description: View your collections.
    usage: /<command>
  fairy:
    description: View fairy soul progress.
    usage: /<command>
  hotm:
    description: View Heart of the Mountain tree.
    usage: /<command>
  island:
    description: Manage your island.
    usage: /<command>
  kuudra:
    description: View Kuudra stats.
    usage: /<command>
  mayor:
    description: View current mayor and perks.
    usage: /<command>
  pets:
    description: Manage your pets.
    usage: /<command>
  skills:
    description: View your skills.
    usage: /<command>
  slayer:
    description: View your slayer quests.
    usage: /<command>
    aliases: [slay]

permissions:
  skyblock.command.skyblock:
    description: Allows use of the /skyblock command.
    default: true
