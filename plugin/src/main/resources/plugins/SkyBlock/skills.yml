# Skill definitions for Hypixel SkyBlock.
# Each key under "skills" is a skill-id. Its "max-level" is the highest level
# that skill can reach. The eight main skills cap at 60, Carpentry at 50, and
# Runecrafting / Social cap at 25.

skills:
  farming:
    max-level: 60
  mining:
    max-level: 60
  combat:
    max-level: 60
  foraging:
    max-level: 60
  fishing:
    max-level: 60
  enchanting:
    max-level: 60
  alchemy:
    max-level: 60
  taming:
    max-level: 60
  carpentry:
    max-level: 50
  runecrafting:
    max-level: 25
  social:
    max-level: 25
