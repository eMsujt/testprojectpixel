# NPC shop definitions for Hypixel SkyBlock.
# Each key under "shops" is a shop-id. A shop has a display title, the
# world-space location of its NPC, and the list of items it sells.
#   npc-location: "world,x,y,z"
#   items:        list of "MATERIAL:price" entries

