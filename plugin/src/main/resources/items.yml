    damage: 90.0
    strength: 20
    description: "A crystalline blade forged from ocean depths."

  FIGHTERS_SWORD:
    displayName: "Fighter's Sword"
    material: IRON_SWORD
    rarity: RARE
    damage: 70.0
    strength: 30
    description: "A sturdy blade favored by combat trainers."

  INK_WAND:
    displayName: "Ink Wand"
    material: BLAZE_ROD
    rarity: RARE
    damage: 100.0
    intelligence: 50
