items:
  WOODEN_SWORD:
    displayName: "Wooden Sword"
    material: WOODEN_SWORD
    rarity: COMMON
    damage: 20.0
    strength: 0
    description: "A basic wooden blade given to every new adventurer."

  STONE_SWORD:
    displayName: "Stone Sword"
    material: STONE_SWORD
    rarity: COMMON
    damage: 30.0
    strength: 5
    description: "A sturdy stone blade, a step up from wood."

  IRON_SWORD:
    displayName: "Iron Sword"
    material: IRON_SWORD
    rarity: COMMON
    damage: 45.0
    strength: 10
    description: "A reliable iron blade for early adventurers."

  GOLD_SWORD:
    displayName: "Gold Sword"
    material: GOLDEN_SWORD
    rarity: UNCOMMON
    damage: 40.0
    strength: 15
    description: "Soft but swift — grants a small strength bonus."

  LEAPING_SWORD:
    displayName: "Leaping Sword"
    material: IRON_SWORD
    rarity: RARE
    damage: 80.0
    strength: 25
    description: "Launches you into the air on right-click."

  TACTICIANS_SWORD:
    displayName: "Tactician's Sword"
    material: IRON_SWORD
    rarity: RARE
    damage: 60.0
    intelligence: 50
    description: "Reduces the mana cost of your other abilities on right-click."

  ZOMBIE_SWORD:
    displayName: "Zombie Sword"
    material: ROTTEN_FLESH
    rarity: UNCOMMON
    damage: 50.0
    strength: 15
    description: "Heals you for a portion of damage dealt to undead."

  SPIDER_SWORD:
    displayName: "Spider Sword"
    material: SPIDER_EYE
    rarity: UNCOMMON
    damage: 45.0
    strength: 20
    description: "Poisons enemies on hit."

  UNDEAD_SWORD:
    displayName: "Undead Sword"
    material: BONE
    rarity: UNCOMMON
    damage: 55.0
    strength: 15
    description: "Deals bonus damage to undead mobs."

  PRISMARINE_BLADE:
    displayName: "Prismarine Blade"
