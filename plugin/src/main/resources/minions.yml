minions:
  WHEAT:
    displayName: "Wheat Minion"
    description: "Harvests wheat automatically."
    resource: WHEAT
    baseInterval: 26

  CARROT:
    displayName: "Carrot Minion"
    description: "Harvests carrots automatically."
    resource: CARROT
    baseInterval: 26

  POTATO:
    displayName: "Potato Minion"
    description: "Harvests potatoes automatically."
    resource: POTATO
    baseInterval: 26

  PUMPKIN:
    displayName: "Pumpkin Minion"
    description: "Grows pumpkins automatically."
    resource: PUMPKIN
    baseInterval: 35

  MELON:
    displayName: "Melon Minion"
    description: "Grows melons automatically."
    resource: MELON_SLICE
    baseInterval: 26

  SUGAR_CANE:
    displayName: "Sugar Cane Minion"
    description: "Grows sugar cane automatically."
    resource: SUGAR_CANE
    baseInterval: 17

  COBBLESTONE:
    displayName: "Cobblestone Miner"
    description: "Generates cobblestone automatically."
    resource: COBBLESTONE
    baseInterval: 14
    # Cobblestone Miner tiers I–XI (wiki-accurate).
    # Speed (seconds) ×20 = productionIntervalTicks.
    # Storage 64/192/384/576/768/960 items = 1/3/6/9/12/15 slots.
    tiers:
      I:    { productionIntervalTicks: 280, storageSlots: 1 }
      II:   { productionIntervalTicks: 280, storageSlots: 3 }
      III:  { productionIntervalTicks: 240, storageSlots: 3 }
      IV:   { productionIntervalTicks: 240, storageSlots: 6 }
      V:    { productionIntervalTicks: 240, storageSlots: 6 }
      VI:   { productionIntervalTicks: 220, storageSlots: 9 }
      VII:  { productionIntervalTicks: 220, storageSlots: 9 }
      VIII: { productionIntervalTicks: 200, storageSlots: 12 }
      IX:   { productionIntervalTicks: 200, storageSlots: 12 }
      X:    { productionIntervalTicks: 180, storageSlots: 15 }
      XI:   { productionIntervalTicks: 160, storageSlots: 15 }

  OAK:
    displayName: "Oak Minion"
    description: "Chops oak logs automatically."
    resource: OAK_LOG
    baseInterval: 26

  FISHING:
    displayName: "Fishing Minion"
    description: "Fishes automatically."
    resource: COD
    baseInterval: 35
