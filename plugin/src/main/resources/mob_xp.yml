# Combat XP granted per mob killed, read from the jar by CombatListener.
# Each key under `mobs` is a Bukkit EntityType name; its value is the Combat XP
# awarded when a player kills that mob. Unlisted mobs grant no Combat XP. If this
# file is missing the listener falls back to its built-in defaults.
mobs:
  ZOMBIE: 5
  SKELETON: 5
  SPIDER: 5
  CAVE_SPIDER: 5
  CREEPER: 7
  ENDERMAN: 12
  WITCH: 12
  SLIME: 4
  MAGMA_CUBE: 4
  BLAZE: 10
  GHAST: 10
  PIG_ZOMBIE: 8
  ZOMBIFIED_PIGLIN: 8
