# NPC shop definitions for Hypixel SkyBlock.
# Each key under "shops" is a shop-id. A shop has a display title, the
# world-space location of its NPC, and the list of items it sells.
#   npc-location: "world,x,y,z"
#   items:        list of "MATERIAL:price" entries (price = NPC buy cost in coins)
# Trailing "# sell N" comments record the NPC sell-back coin price for each item.

shops:
  general_merchant:
    title: "§aGeneral Merchant"
    npc-location: "world,0,70,0"
    items:
      - "COOKED_BEEF:3"      # sell 2
      - "ROTTEN_FLESH:5"     # sell 1
      - "BONE:5"             # sell 1
      - "STRING:9"           # sell 1
      - "GUNPOWDER:12"       # sell 2
      - "SLIME_BALL:10"      # sell 2
  farm_merchant:
    title: "§aFarm Merchant"
    npc-location: "world,5,70,5"
    items:
      - "WHEAT:6"            # sell 3
      - "CARROT:5"           # sell 3
      - "POTATO:5"           # sell 3
      - "PUMPKIN:8"          # sell 4
      - "MELON:4"            # sell 2
      - "SUGAR_CANE:9"       # sell 4
      - "NETHER_WART:7"      # sell 4
  mine_merchant:
    title: "§7Mine Merchant"
    npc-location: "world,-10,68,12"
    items:
      - "COBBLESTONE:3"      # sell 1
      - "COAL:5"             # sell 2
      - "IRON_INGOT:20"      # sell 10
      - "GOLD_INGOT:30"      # sell 15
      - "REDSTONE:8"         # sell 4
      - "LAPIS_LAZULI:12"    # sell 6
