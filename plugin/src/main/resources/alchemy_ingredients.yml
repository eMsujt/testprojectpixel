# Alchemy XP granted per output potion slot when the listed ingredient is used.
# Each key under `ingredients` is a Bukkit Material name; its value is the XP
# awarded per filled output slot. Unlisted ingredients grant no Alchemy XP.
# If this file is missing the listener falls back to its built-in defaults.
ingredients:
  NETHER_WART: 3
  SUGAR: 3
  BLAZE_POWDER: 3
  GHAST_TEAR: 5
  MAGMA_CREAM: 3
  GLISTERING_MELON_SLICE: 3
  SPIDER_EYE: 3
  FERMENTED_SPIDER_EYE: 3
  PUFFERFISH: 3
  RABBIT_FOOT: 3
  GOLDEN_CARROT: 3
  PHANTOM_MEMBRANE: 5
  TURTLE_HELMET: 5
  DRAGON_BREATH: 5
  GUNPOWDER: 3
  REDSTONE: 3
  GLOWSTONE_DUST: 3
